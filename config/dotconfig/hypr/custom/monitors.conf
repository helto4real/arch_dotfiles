################
### MONITORS ###
################

# HDR borttaget från flaggorna, men 10-bitars färg behålls
monitor = desc:ASUSTek COMPUTER INC XG32UCWMG T7LMQS113050, 3840x2160@240.02, auto, 1.25, bitdepth, 10

monitor = FALLBACK, 1920x1080@30, auto, 1

# Render-sektionen
render {
    cm_fs_passthrough = 0     # Ändrat till 0 för att undvika påtvingad HDR-passthrough
    cm_enabled = true         # Behåll färghantering för 10-bitars stöd
    cm_auto_hdr = 0           # Inaktiverar automatisk HDR vid fullskärm
    send_content_type = true 
}

# XWayland inställningar
xwayland {
    force_zero_scaling = true
}

# Miljövariabler
env = GDK_SCALE, 2
env = XCURSOR_SIZE, 32
